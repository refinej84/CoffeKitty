{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>404 - Coffee Kitty</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to bottom, #ffe4ec, #f8bbd0);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: #fff0f5;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            max-width: 400px;
        }

        h1 {
            font-size: 80px;
            color: #d81b60;
            margin: 0;
        }

        h2 {
            color: #6a1b4d;
            margin-bottom: 10px;
        }

        p {
            color: #6a1b4d;
            margin-bottom: 20px;
        }

        a {
            display: inline-block;
            padding: 10px 20px;
            background: #f48fb1;
            color: white;
            text-decoration: none;
            border-radius: 15px;
            transition: 0.3s;
        }

        a:hover {
            background: #ec407a;
        }

        img {
            width: 120px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <div class="container">
        <img src="{% static 'cafeteria/imgs/kitty.png' %}">
        <h1>404</h1>
        <h2>Ops! Página não encontrada</h2>
        <p>Essa página não existe no Coffee Kitty ☕🐱</p>

        <a href="{% url 'home' %}">Voltar para o início</a>
    </div>

</body>
</html>
