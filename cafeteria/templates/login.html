{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Login - Coffee Kitty</title>
    <link rel="stylesheet" href="{% static 'cafeteria/style.css' %}">
    <link rel="icon" href="{% static 'cafeteria/imgs/kitty.png' %}">
</head>
<body class="login-body">

<div class="login-container">

    <img src="{% static 'cafeteria/imgs/logo2.png' %}" class="logo">

    <h2>Bem-vindo ☕</h2>

    <form method="post">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Usuário">
        <input type="password" name="password" placeholder="Senha">

        <button type="submit">Entrar</button>
    </form>

</div>

</body>
</html>
